<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Vote — LENA Supply Chain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f8fafc;
      --card:   #ffffff;
      --border: rgba(0,0,0,0.1);
      --muted:  rgba(0,0,0,0.04);
      --text:   #0f172a;
      --sub:    rgba(15,23,42,0.6);
      --blue:   #005591;
      --cyan:   #00bcd4;
      --red:    #ef4444;
      --green:  #22c55e;
      --amber:  #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", "Segoe UI", sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .wrap { max-width: 420px; margin: 0 auto; padding: 28px 16px 0; }

    /* ── Title ── */
    .eyebrow {
      text-align: center; font-size: 11px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--cyan); margin-bottom: 6px;
    }
    h1 {
      text-align: center; font-size: 26px; font-weight: 900;
      line-height: 1.1; margin-bottom: 6px;
    }
    .subtitle { text-align: center; font-size: 13px; color: var(--sub); margin-bottom: 20px; }

    /* ── Total card ── */
    .total-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .total-left { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--cyan); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    .status-dot.closed { background: var(--amber); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .total-bar-wrap { margin-top: 6px; }
    .bar-track { height: 8px; border-radius: 99px; background: var(--muted); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--blue), var(--cyan)); transition: width 0.7s ease; }

    /* ── Scenario cards ── */
    .scenario-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .scenario-card:active { transform: scale(0.985); }
    .scenario-card.voted {
      /* dynamically coloured by JS */
    }
    .scenario-card.disabled { cursor: not-allowed; }

    .sc-top { padding: 18px 18px 14px; display: flex; align-items: center; justify-content: space-between; }
    .sc-left { display: flex; align-items: center; gap: 12px; }
    .sc-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; color: #fff; flex-shrink: 0; }
    .sc-name { font-weight: 700; font-size: 15px; }
    .sc-loc { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .check-icon { font-size: 22px; display: none; }
    .scenario-card.voted .check-icon { display: block; }

    .sc-bottom {
      padding: 10px 18px 14px;
      display: flex; align-items: center; gap: 14px;
      border-top: 1px solid var(--border);
    }
    .sc-stats { flex: 1; }
    .sc-nums { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; margin-bottom: 5px; }
    .sc-bar-track { height: 6px; border-radius: 99px; background: var(--muted); overflow: hidden; }
    .sc-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    .vote-btn {
      flex-shrink: 0; padding: 9px 20px;
      border: none; border-radius: 12px;
      font-family: inherit; font-size: 13px; font-weight: 700;
      color: #fff; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .vote-btn:active { transform: scale(0.93); }
    .vote-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .voted-label {
      flex-shrink: 0; padding: 9px 16px;
      border-radius: 12px; font-size: 12px; font-weight: 700; color: #fff;
      display: none;
    }
    .scenario-card.voted .voted-label { display: block; }
    .scenario-card.voted .vote-btn { display: none; }

    /* ── Closed banner ── */
    .closed-banner {
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 14px; padding: 18px; text-align: center;
      margin-top: 12px; display: none;
    }
    .closed-banner.show { display: block; }
    .closed-banner p:first-child { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .closed-banner p:last-child { font-size: 12px; color: var(--sub); }

    /* ── Thanks banner ── */
    .thanks-banner {
      border-radius: 14px; padding: 14px 16px; text-align: center;
      margin-top: 4px; display: none; font-size: 13px; font-weight: 600;
    }
    .thanks-banner.show { display: block; }

    /* ── WS lost ── */
    #ws-lost {
      display: none; position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(239,68,68,0.9); color: #fff;
      padding: 10px 22px; border-radius: 99px; font-size: 13px; font-weight: 700;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Live Audience Vote</p>
  <h1 id="main-title">Vote for a Scenario</h1>
  <p class="subtitle" id="main-sub">Tap a scenario below to cast your vote</p>

  <!-- Total -->
  <div class="total-card">
    <div class="total-left">
      <div class="status-dot" id="status-dot"></div>
      <span id="total-label">0 votes cast</span>
    </div>
  </div>

  <!-- Cards -->
  <div id="scenario-list"></div>

  <div class="closed-banner" id="closed-banner">
    <p>✅ Voting Complete</p>
    <p>Voting has been closed.<br>Check the main screen for live results!</p>
  </div>

  <div class="thanks-banner" id="thanks-banner">
    🎉 Thanks for voting! Watch the live screen to see results.
  </div>
</div>

<div id="ws-lost">⚠ Connection lost — reconnecting…</div>

<script>
const SCENARIOS = [
  { id: "A", name: "Helios Steel Works",    loc: "Scunthorpe, North Lincolnshire", color: "#005591", glow: "rgba(0,85,145,0.25)" },
  { id: "B", name: "CryoMed Hospital Trust",loc: "Hull, East Yorkshire",           color: "#ef4444", glow: "rgba(239,68,68,0.22)" },
  { id: "C", name: "BioPharm Solutions",    loc: "Grimsby, Lincolnshire",          color: "#00bcd4", glow: "rgba(0,188,212,0.25)" },
];

// ── Persistent session ID ─────────────────────────────────────────────────────
let sessionId = sessionStorage.getItem("lena_session_id");
if (!sessionId) {
  sessionId = Math.random().toString(36).slice(2) + Date.now().toString(36);
  sessionStorage.setItem("lena_session_id", sessionId);
}
let hasVoted = sessionStorage.getItem("lena_my_vote");

// ── Build DOM ─────────────────────────────────────────────────────────────────
function buildUI() {
  const list = document.getElementById("scenario-list");
  SCENARIOS.forEach(s => {
    list.innerHTML += `
    <div class="scenario-card${hasVoted === s.id ? " voted" : ""}" id="card-${s.id}"
         style="${hasVoted === s.id ? `border-color:${s.color};box-shadow:0 0 0 2px ${s.glow}` : ""}">
      <div class="sc-top">
        <div class="sc-left">
          <div class="sc-avatar" style="background:${s.color}">${s.id}</div>
          <div>
            <div class="sc-name">${s.name}</div>
            <div class="sc-loc">${s.loc}</div>
          </div>
        </div>
        <span class="check-icon" style="color:${s.color}">✅</span>
      </div>
      <div class="sc-bottom">
        <div class="sc-stats">
          <div class="sc-nums">
            <span id="v-${s.id}" style="color:${s.color};font-weight:600">0 votes</span>
            <span id="p-${s.id}" style="color:${s.color};font-weight:700">0%</span>
          </div>
          <div class="sc-bar-track">
            <div class="sc-bar-fill" id="b-${s.id}" style="background:${s.color};width:0%"></div>
          </div>
        </div>
        <button class="vote-btn" id="vbtn-${s.id}" style="background:${s.color};box-shadow:0 3px 12px ${s.glow}"
                onclick="castVote('${s.id}')">Vote</button>
        <div class="voted-label" style="background:${s.color}">✓ Voted</div>
      </div>
    </div>`;
  });
}

// ── Apply state ───────────────────────────────────────────────────────────────
let currentState = null;

function applyState(state) {
  currentState = state;
  const total = state.A + state.B + state.C;

  document.getElementById("total-label").textContent = `${total} votes cast`;
  document.getElementById("status-dot").className = state.closed ? "status-dot closed" : "status-dot";

  SCENARIOS.forEach(s => {
    const v = state[s.id] ?? 0;
    const pct = total > 0 ? Math.round((v / total) * 100) : 0;
    document.getElementById("v-" + s.id).textContent = `${v} votes`;
    document.getElementById("p-" + s.id).textContent = `${pct}%`;
    document.getElementById("b-" + s.id).style.width = pct + "%";

    const btn = document.getElementById("vbtn-" + s.id);
    if (btn) btn.disabled = !!hasVoted || state.closed;
  });

  if (state.closed) {
    document.getElementById("main-title").textContent = hasVoted ? "Your vote is in!" : "Voting Closed";
    document.getElementById("main-sub").textContent = "Voting has been closed. Results are live on the main screen.";
    document.getElementById("closed-banner").className = "closed-banner show";
  } else if (hasVoted) {
    document.getElementById("main-title").textContent = "Your vote is in!";
    document.getElementById("main-sub").textContent = `You voted for Scenario ${hasVoted} — thank you!`;
    document.getElementById("thanks-banner").className = "thanks-banner show";
    document.getElementById("thanks-banner").style.background = "rgba(0,188,212,0.1)";
    document.getElementById("thanks-banner").style.color = "#00bcd4";
    document.getElementById("thanks-banner").style.border = "1px solid rgba(0,188,212,0.25)";
  }
}

// ── Cast vote ─────────────────────────────────────────────────────────────────
function castVote(id) {
  if (hasVoted || !ws || ws.readyState !== 1) return;
  if (currentState?.closed) return;
  ws.send(JSON.stringify({ type: "vote", scenario: id, sessionId }));
  // Optimistically mark as voted
  hasVoted = id;
  sessionStorage.setItem("lena_my_vote", id);

  const card = document.getElementById("card-" + id);
  const s = SCENARIOS.find(x => x.id === id);
  card.classList.add("voted");
  card.style.borderColor = s.color;
  card.style.boxShadow = `0 0 0 2px ${s.glow}`;
  SCENARIOS.forEach(sc => {
    const btn = document.getElementById("vbtn-" + sc.id);
    if (btn) btn.disabled = true;
  });
  document.getElementById("main-title").textContent = "Your vote is in!";
  document.getElementById("main-sub").textContent = `You voted for Scenario ${id} — thank you!`;
  document.getElementById("thanks-banner").className = "thanks-banner show";
  document.getElementById("thanks-banner").style.background = "rgba(0,188,212,0.1)";
  document.getElementById("thanks-banner").style.color = "#00bcd4";
  document.getElementById("thanks-banner").style.border = "1px solid rgba(0,188,212,0.25)";
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws;
function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => document.getElementById("ws-lost").style.display = "none";
  ws.onclose = () => { document.getElementById("ws-lost").style.display = "block"; setTimeout(connect, 2000); };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "state") applyState(msg.state);
    else if (msg.type === "error" && msg.reason === "already_voted") {
      hasVoted = sessionStorage.getItem("lena_my_vote") || "?";
    }
  };
}

buildUI();
connect();
</script>
</body>
</html>
